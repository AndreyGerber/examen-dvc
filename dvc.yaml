stages:
  split:
    cmd: python src/data/01_split_data.py
    deps:
      - data/raw_data/raw.csv
      - src/data/01_split_data.py
    outs:
      - data/processed_data/X_train.csv
      - data/processed_data/X_test.csv
      - data/processed_data/y_train.csv
      - data/processed_data/y_test.csv

  normalize:
    cmd: python src/data/02_normalize_data_std.py
    deps:
      - data/processed_data/X_train.csv
      - data/processed_data/X_test.csv
      - src/data/02_normalize_data_std.py
    outs:
      - data/processed_data/X_train_scaled.csv
      - data/processed_data/X_test_scaled.csv

  gridsearch:
    cmd: python src/models/03_grid_search.py
    deps:
      - data/processed_data/X_train_scaled.csv
      - data/processed_data/y_train.csv
      - src/models/03_grid_search.py
    outs:
      - models/best_params.pkl

  training:
    cmd: python src/models/04_model_training.py
    deps:
      - data/processed_data/X_train_scaled.csv
      - data/processed_data/y_train.csv
      - models/best_params.pkl
      - src/models/04_model_training.py
    outs:
      - models/gbr_model.pkl

  evaluate:
    cmd: python src/models/05_evaluate.py
    deps:
      - data/processed_data/X_test_scaled.csv
      - data/processed_data/y_test.csv
      - models/gbr_model.pkl
      - src/models/05_evaluate.py
    outs:
      - data/prediction.csv
    metrics:
      - metrics/scores.json:
          cache: false
